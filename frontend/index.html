<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#050810" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="LiveWar3D" />

    <!-- Primary SEO -->
    <title>LiveWar3D — Real-Time Military Tracking on a 3D Globe</title>
    <meta name="description" content="LiveWar3D: real-time military aircraft, warships and active conflict zones on an interactive 3D globe. Live cameras, AI threat analysis, FIRMS fire data and breaking war news." />
    <meta name="keywords" content="live war map, military tracking, real-time conflict map, warship tracker, military aircraft live, 3D globe conflict, ukraine war live, taiwan strait, south china sea, military intelligence, OSINT, live war camera, defense tracker" />
    <meta name="author" content="LiveWar3D" />
    <link rel="canonical" href="https://livewar3d.com/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph (Facebook / Discord / WhatsApp) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://livewar3d.com/" />
    <meta property="og:title" content="LiveWar3D — Real-Time Military Tracking" />
    <meta property="og:description" content="Track military aircraft, warships and active conflict zones on a live 3D globe. Live conflict cameras, AI threat scores and breaking war news." />
    <meta property="og:image" content="https://livewar3d.com/icon-512.png" />
    <meta property="og:site_name" content="LiveWar3D" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@livewar3d" />
    <meta name="twitter:title" content="LiveWar3D — Real-Time Military Tracking" />
    <meta name="twitter:description" content="Live military aircraft, warships and conflict zones on an interactive 3D globe. AI threat analysis, live conflict cameras and breaking war news." />
    <meta name="twitter:image" content="https://livewar3d.com/icon-512.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "LiveWar3D",
      "url": "https://livewar3d.com",
      "description": "Real-time military aircraft, warships and active conflict zones on an interactive 3D globe with AI threat analysis and live cameras.",
      "applicationCategory": "NewsApplication",
      "operatingSystem": "Any",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
    }
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #050810; }
      /* Kill Cesium's blue flash: force canvas background before WebGL paints */
      .cesium-widget,
      .cesium-widget canvas,
      .cesium-container { background: #050810 !important; }
      /* Hide Cesium default credits */
      .cesium-credit-logoContainer,
      .cesium-credit-textContainer { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
