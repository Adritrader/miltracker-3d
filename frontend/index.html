<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>MilTracker 3D — Real-Time Military Tracking</title>
    <meta name="description" content="Real-time military aircraft and warship tracking on a 3D globe with AI threat analysis" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; background: #050810; }
      /* Kill Cesium's blue flash: force canvas background before WebGL paints */
      .cesium-widget,
      .cesium-widget canvas,
      .cesium-container { background: #050810 !important; }
      /* Hide Cesium default credits */
      .cesium-credit-logoContainer,
      .cesium-credit-textContainer { display: none !important; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
